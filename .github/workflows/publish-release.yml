name: Publish Release

run-name: Publish ${{ inputs.version }} (${{ inputs.channel }})

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (for example: 1.2.3)"
        required: true
        default: "0.0.0"
        type: string
      channel:
        description: "Release type"
        required: true
        default: release
        type: choice
        options:
          - release
          - preview

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: windows-latest

    env:
      PROJECT_PATH: VSSL.App/VSSL.App.csproj
      CONFIGURATION: Release
      RUNTIME: win-x64
      VINTAGE_STORY_VERSION: 1.22.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Prepare Vintage Story API refs
        shell: powershell
        run: |
          $vsVersion = $env:VINTAGE_STORY_VERSION
          if ([string]::IsNullOrWhiteSpace($vsVersion)) { throw "VINTAGE_STORY_VERSION is empty." }

          $vsRoot = Join-Path $pwd ".vintagestory-runtime"
          $apiDll = Join-Path $vsRoot "VintagestoryAPI.dll"
          $libDll = Join-Path $vsRoot "VintagestoryLib.dll"
          $protobufDll = Join-Path $vsRoot "Lib/protobuf-net.dll"

          if (!(Test-Path $apiDll) -or !(Test-Path $libDll) -or !(Test-Path $protobufDll)) {
            New-Item -ItemType Directory -Force -Path $vsRoot | Out-Null
            $zipPath = Join-Path $vsRoot "vs_server_win-x64_$vsVersion.zip"
            $downloadUrl = "https://cdn.vintagestory.at/gamefiles/stable/vs_server_win-x64_$vsVersion.zip"

            Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
            try {
              $requiredEntries = @(
                "VintagestoryAPI.dll",
                "VintagestoryLib.dll",
                "Lib/protobuf-net.dll"
              )

              foreach ($entryName in $requiredEntries) {
                $entry = $zip.GetEntry($entryName)
                if ($null -eq $entry) {
                  throw "Missing required file '$entryName' in $downloadUrl"
                }

                $targetPath = Join-Path $vsRoot $entryName
                $targetDir = Split-Path -Parent $targetPath
                if (!(Test-Path $targetDir)) {
                  New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
                }

                $entryStream = $entry.Open()
                $fileStream = [System.IO.File]::Open($targetPath, [System.IO.FileMode]::Create, [System.IO.FileAccess]::Write, [System.IO.FileShare]::Read)
                try {
                  $entryStream.CopyTo($fileStream)
                }
                finally {
                  $entryStream.Dispose()
                  $fileStream.Dispose()
                }
              }
            }
            finally {
              $zip.Dispose()
            }

            if (Test-Path $zipPath) {
              Remove-Item -LiteralPath $zipPath -Force
            }
          }

          "VINTAGE_STORY=$vsRoot" >> $env:GITHUB_ENV
          Write-Host "Using VINTAGE_STORY=$vsRoot"

      - name: Resolve release metadata
        id: meta
        shell: powershell
        run: |
          $rawVersion = "${{ inputs.version }}".Trim()
          if ($rawVersion.StartsWith("v")) { $rawVersion = $rawVersion.Substring(1) }
          if ([string]::IsNullOrWhiteSpace($rawVersion)) {
            throw "Version input is empty."
          }

          $channel = "${{ inputs.channel }}".Trim().ToLowerInvariant()
          if ($channel -notin @("release", "preview")) {
            throw "Unsupported channel: $channel"
          }

          $version = $rawVersion
          if ($channel -eq "preview" -and $version -notmatch "-") {
            $version = "$version-preview"
          }

          $tag = "v$version"
          $title = "VSSL $version"
          if ($channel -eq "preview") {
            $title = "$title (Preview)"
          }

          $isPrerelease = if ($channel -eq "preview") { "true" } else { "false" }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=$title" >> $env:GITHUB_OUTPUT
          "prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore VSSL.sln

      - name: Restore embedded restriction mod project
        run: dotnet restore VSSL.Services/EmbeddedMods/VsslRestrictionMod/VsslRestrictionMod.csproj

      - name: Publish installer payload
        run: dotnet publish $env:PROJECT_PATH -c $env:CONFIGURATION -r $env:RUNTIME --self-contained true -p:Version=${{ steps.meta.outputs.version }} -o artifacts/publish/win-x64

      - name: Publish portable single-file
        run: dotnet publish $env:PROJECT_PATH -c $env:CONFIGURATION -r $env:RUNTIME --self-contained true -p:Version=${{ steps.meta.outputs.version }} -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=None -p:DebugSymbols=false -o artifacts/publish/portable

      - name: Prepare portable artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/portable | Out-Null
          Copy-Item -LiteralPath "artifacts/publish/portable/VSSL.App.exe" -Destination "artifacts/portable/VSSL-portable-${{ steps.meta.outputs.version }}-win-x64.exe" -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer package
        shell: powershell
        run: |
          $version = "${{ steps.meta.outputs.version }}"

          New-Item -ItemType Directory -Force -Path artifacts/installer | Out-Null

          $buildDir = (Resolve-Path "artifacts/publish/win-x64").Path
          $outputDir = (Resolve-Path "artifacts/installer").Path

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "/DBuildDir=$buildDir" `
            "/DOutputDir=$outputDir" `
            "installer/VSSL.iss"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/installer/*.exe
            artifacts/portable/VSSL-portable-${{ steps.meta.outputs.version }}-win-x64.exe
