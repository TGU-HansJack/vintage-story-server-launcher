name: Build Windows Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (for example: 1.2.3)"
        required: true
        default: "0.0.0"
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      PROJECT_PATH: VSSL.App/VSSL.App.csproj
      CONFIGURATION: Release
      RUNTIME: win-x64
      VINTAGE_STORY_VERSION: 1.22.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Prepare Vintage Story API refs
        shell: powershell
        run: |
          $vsVersion = $env:VINTAGE_STORY_VERSION
          if ([string]::IsNullOrWhiteSpace($vsVersion)) { throw "VINTAGE_STORY_VERSION is empty." }

          $vsRoot = Join-Path $pwd ".vintagestory-runtime"
          $apiDll = Join-Path $vsRoot "VintagestoryAPI.dll"
          $libDll = Join-Path $vsRoot "VintagestoryLib.dll"
          $protobufDll = Join-Path $vsRoot "Lib/protobuf-net.dll"

          if (!(Test-Path $apiDll) -or !(Test-Path $libDll) -or !(Test-Path $protobufDll)) {
            New-Item -ItemType Directory -Force -Path $vsRoot | Out-Null
            $zipPath = Join-Path $vsRoot "vs_server_win-x64_$vsVersion.zip"
            $downloadUrl = "https://cdn.vintagestory.at/gamefiles/stable/vs_server_win-x64_$vsVersion.zip"

            Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
            try {
              $requiredEntries = @(
                "VintagestoryAPI.dll",
                "VintagestoryLib.dll",
                "Lib/protobuf-net.dll"
              )

              foreach ($entryName in $requiredEntries) {
                $entry = $zip.GetEntry($entryName)
                if ($null -eq $entry) {
                  throw "Missing required file '$entryName' in $downloadUrl"
                }

                $targetPath = Join-Path $vsRoot $entryName
                $targetDir = Split-Path -Parent $targetPath
                if (!(Test-Path $targetDir)) {
                  New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
                }

                $entryStream = $entry.Open()
                $fileStream = [System.IO.File]::Open($targetPath, [System.IO.FileMode]::Create, [System.IO.FileAccess]::Write, [System.IO.FileShare]::Read)
                try {
                  $entryStream.CopyTo($fileStream)
                }
                finally {
                  $entryStream.Dispose()
                  $fileStream.Dispose()
                }
              }
            }
            finally {
              $zip.Dispose()
            }

            if (Test-Path $zipPath) {
              Remove-Item -LiteralPath $zipPath -Force
            }
          }

          "VINTAGE_STORY=$vsRoot" >> $env:GITHUB_ENV
          Write-Host "Using VINTAGE_STORY=$vsRoot"

      - name: Restore
        run: dotnet restore VSSL.sln

      - name: Resolve package version
        id: resolve_version
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          }
          else {
            $version = "0.0.0-${{ github.run_number }}"
          }

          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Resolved version is empty."
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Publish installer payload
        run: dotnet publish $env:PROJECT_PATH -c $env:CONFIGURATION -r $env:RUNTIME --self-contained true -p:Version=${{ steps.resolve_version.outputs.value }} -o artifacts/publish/win-x64

      - name: Publish portable single-file
        run: dotnet publish $env:PROJECT_PATH -c $env:CONFIGURATION -r $env:RUNTIME --self-contained true -p:Version=${{ steps.resolve_version.outputs.value }} -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=None -p:DebugSymbols=false -o artifacts/publish/portable

      - name: Prepare portable artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/portable | Out-Null
          Copy-Item -LiteralPath "artifacts/publish/portable/VSSL.App.exe" -Destination "artifacts/portable/VSSL-portable-${{ steps.resolve_version.outputs.value }}-win-x64.exe" -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer package
        shell: powershell
        run: |
          $version = "${{ steps.resolve_version.outputs.value }}"

          New-Item -ItemType Directory -Force -Path artifacts/installer | Out-Null

          $buildDir = (Resolve-Path "artifacts/publish/win-x64").Path
          $outputDir = (Resolve-Path "artifacts/installer").Path

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "/DBuildDir=$buildDir" `
            "/DOutputDir=$outputDir" `
            "installer/VSSL.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VSSL-installer-${{ steps.resolve_version.outputs.value }}-win-x64
          path: artifacts/installer/*.exe
          if-no-files-found: error

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: VSSL-portable-${{ steps.resolve_version.outputs.value }}-win-x64
          path: artifacts/portable/VSSL-portable-${{ steps.resolve_version.outputs.value }}-win-x64.exe
          if-no-files-found: error
